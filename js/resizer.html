<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client-Side Image Resizer</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 600px; margin: 0 auto; }
        #drop-zone {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 3rem;
            text-align: center;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #drop-zone.dragover {
            border-color: #007bff;
            background: #e9ecef;
        }
        #preview-container {
            margin-top: 2rem;
            display: none;
        }
        img { max-width: 100%; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .stats { margin-top: 1rem; font-size: 0.9rem; color: #555; }
    </style>
</head>
<body>

    <h2>Smart Image Resizer</h2>
    
    <div id="drop-zone">
        <p>Drag & Drop an image here, or click to select</p>
        <input type="file" id="file-input" accept="image/*" style="display: none;">
    </div>

    <div id="preview-container">
        <h3>Resized Result:</h3>
        <img id="preview-image" alt="Resized preview">
        <div class="stats" id="stats-output"></div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const previewImage = document.getElementById('preview-image');
        const statsOutput = document.getElementById('stats-output');

        // Configuration
        const MAX_WIDTH = 800;
        const MAX_HEIGHT = 800;
        const QUALITY = 0.8; // 0.0 to 1.0 (JPEG compression)

        // --- Event Listeners ---
        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) processFile(e.target.files[0]);
        });

        // --- Core Logic ---
        function processFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please upload an image file.');
                return;
            }

            const originalSize = (file.size / 1024).toFixed(2);

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                
                img.onload = () => {
                    // 1. Calculate new dimensions while maintaining aspect ratio
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height = Math.round(height *= MAX_WIDTH / width);
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width = Math.round(width *= MAX_HEIGHT / height);
                            height = MAX_HEIGHT;
                        }
                    }

                    // 2. Create an invisible Canvas
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');

                    // 3. Draw the image onto the canvas at the new, smaller size
                    ctx.drawImage(img, 0, 0, width, height);

                    // 4. Export as a compressed Base64 string
                    const compressedDataUrl = canvas.toDataURL('image/jpeg', QUALITY);
                    
                    // Calculate rough size of new base64 string
                    const newSize = Math.round((compressedDataUrl.length * (3/4)) / 1024);

                    // Display results
                    previewImage.src = compressedDataUrl;
                    previewContainer.style.display = 'block';
                    statsOutput.innerHTML = `
                        <strong>Original:</strong> ${originalSize} KB (${img.width}x${img.height})<br>
                        <strong>Resized:</strong> ~${newSize} KB (${width}x${height})
                    `;

                    // TODO: You would now send 'compressedDataUrl' to your server via fetch/axios!
                };
            };
        }
    </script>
</body>
</html>
